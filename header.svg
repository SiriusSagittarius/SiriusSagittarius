  <path d="M 1.5 45 V 14.5 Q 1.5 1.5 14.5 1.5 H 885.5 Q 898.5 1.5 898.5 14.5 V 45 Z" fill="#161b22"/>
  <line x1="1.5" y1="45" x2="898.5" y2="45" stroke="#30363d" stroke-width="1"/>
  <!-- Ampel-Buttons -->
