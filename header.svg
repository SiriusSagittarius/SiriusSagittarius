  <g font-family="'Fira Code','SF Mono',Consolas,monospace" font-size="16">
    <text x="60" y="80" fill="#6a9955" font-style="italic">/**</text>
    <text x="60" y="116" fill="#6a9955" font-style="italic"> * <tspan font-size="34" font-weight="700" font-style="normal" fill="#f0f6fc">Sven Haase</tspan></text>
    <text x="60" y="148" fill="#6a9955" font-style="italic"> * <tspan fill="#8b949e">Full-Stack Developer · Angular · Three.js · Firebase</tspan></text>
    <text x="60" y="176" fill="#6a9955" font-style="italic"> */</text>
    <text x="60" y="208"><tspan fill="#569cd6">let</tspan> <tspan fill="#9cdcfe">ideas</tspan> <tspan fill="#f0f6fc">=</tspan> <tspan fill="#c586c0">await</tspan> <tspan fill="#9cdcfe">figma</tspan><tspan fill="#f0f6fc">.</tspan><tspan fill="#dcdcaa">import</tspan><tspan fill="#f0f6fc">();</tspan></text>
    <text x="60" y="240"><tspan fill="#c586c0">while</tspan> <tspan fill="#f0f6fc">(</tspan><tspan fill="#569cd6">true</tspan><tspan fill="#f0f6fc">) {</tspan> <tspan fill="#dcdcaa">build</tspan><tspan fill="#f0f6fc">(</tspan><tspan fill="#9cdcfe">ideas</tspan><tspan fill="#f0f6fc">);</tspan> <tspan fill="#dcdcaa">ship</tspan><tspan fill="#f0f6fc">(); }</tspan></text>
  </g>

